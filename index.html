<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For My Gublu Baccha ❤️</title>

<style>
body{
margin:0;
font-family:Arial;
text-align:center;
background:linear-gradient(to bottom right,#ffd6e0,#fff0f5);
overflow:hidden;
padding-top:30px;
}

img{
width:140px;
height:140px;
border-radius:50%;
border:3px solid #ff4d4d;
object-fit:cover;
margin-top:10px;
}

h1{color:#ff4d4d;}

button{
padding:12px 18px;
border:none;
border-radius:20px;
cursor:pointer;
margin:10px;
font-size:16px;
transition:0.3s;
}

button:hover{transform:scale(1.1);}

.forgive{background:#ff4d4d;color:white;}
.hug{background:#ff66b2;color:white;}
.no{background:#ff9999;}

.heart{
position:absolute;
width:15px;height:15px;
background:red;
transform:rotate(45deg);
animation:float 6s linear infinite;
}

.heart:before,.heart:after{
content:"";
position:absolute;
width:15px;height:15px;
background:red;
border-radius:50%;
}

.heart:before{top:-7px;}
.heart:after{left:-7px;}

@keyframes float{
0%{transform:translateY(100vh) rotate(45deg);}
100%{transform:translateY(-10vh) rotate(45deg);opacity:0;}
}
</style>
</head>

<body>

<h1>I'm really sorry, Gublu Baccha ❤️</h1>

<img src="photo.jpg">

<p>Will you forgive me? 🥺</p>

<!-- MUSIC (start here) -->
<audio autoplay loop>
<source src="song.mp3" type="audio/mpeg">
</audio>

<button class="forgive" onclick="go('hug.html')">Forgive me ❤️</button>

<button class="hug" onclick="go('hug.html')">Hug me 🤗</button>

<button class="no" id="noBtn">No 😤</button>

<script>
// runaway button
const btn=document.getElementById("noBtn");

btn.addEventListener("mouseover",()=>{
btn.style.position="absolute";
btn.style.top=Math.random()*80+"vh";
btn.style.left=Math.random()*80+"vw";
});

// navigation
function go(page){
window.location.href=page;
}

// hearts
setInterval(()=>{
const h=document.createElement("div");
h.className="heart";
h.style.left=Math.random()*100+"vw";
document.body.appendChild(h);
setTimeout(()=>h.remove(),6000);
},300);
</script>

</body>
</html>
